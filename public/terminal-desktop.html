<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trading Terminal — Live Charts</title>
<meta name="description" content="Professional multi-asset trading terminal with live TradingView charts." />
<link rel="preconnect" href="https://s3.tradingview.com" />
<style>
  :root{
    --bg:#111219; --fg:#f5f6fa; --muted:#8a8fa3;
    --panel:#1a1c25; --panel-2:#20222d; --border:#2a2d3a;
    --brand:#7c5cff; --bull:#22c55e; --bear:#ef4444;
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    font-size:14px;-webkit-font-smoothing:antialiased}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,select{font:inherit;color:inherit}
  .app{display:flex;flex-direction:column;min-height:100vh}

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .icon-btn{height:40px;width:40px;border-radius:10px;background:var(--panel);border:1px solid var(--border);
    display:inline-flex;align-items:center;justify-content:center;color:var(--fg)}
  .icon-btn:hover{background:var(--panel-2)}
  .search{position:relative;flex:1;max-width:420px}
  .search input{width:100%;height:40px;border-radius:10px;background:var(--panel);
    border:1px solid var(--border);padding:0 14px 0 40px;outline:none}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .spacer{flex:1}
  .btn-ghost{height:40px;padding:0 18px;border-radius:10px;background:var(--panel);
    border:1px solid var(--border);color:var(--brand)}
  .avatar{height:40px;width:40px;border-radius:999px;border:1px solid var(--border);
    background:linear-gradient(135deg,var(--brand),var(--bull))}

  /* Symbols strip */
  .symbols{display:flex;gap:8px;padding:12px 16px 0}
  .sym{flex:1;min-width:0;text-align:left;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:9px 14px;transition:.15s}
  .sym:hover{border-color:#4a4d5e}
  .sym.active{border-color:var(--brand);box-shadow:0 0 0 1px color-mix(in oklab,var(--brand) 55%,transparent) inset}
  .sym .pair{font-size:13px;font-weight:500}
  .sym .row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
  .sym .price{font-size:14px}
  .sym .chg{font-size:12px;font-weight:500}
  .up{color:var(--bull)} .down{color:var(--bear)}
  .sym-plus{width:44px;border-radius:10px;background:var(--panel);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center}

  /* Main */
  .main{display:flex;gap:12px;padding:12px;flex:1;min-height:0}
  .tools{display:flex;flex-direction:column;gap:4px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:6px}
  .tools button{height:36px;width:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .tools button:hover{background:var(--panel-2);color:var(--fg)}

  .chart-panel{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
    display:flex;flex-direction:column;min-width:0}
  .chart-head{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--border)}
  .chart-title{font-size:14px;font-weight:500}
  .intervals{display:flex;gap:2px;background:rgba(0,0,0,.25);border-radius:8px;padding:2px;margin-left:6px}
  .intervals button{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--muted)}
  .intervals button.active{background:var(--brand);color:#fff}
  .chart-body{flex:1;min-height:520px}
  .chart-body iframe,.chart-body .tradingview-widget-container{height:100%!important;width:100%!important}

  /* Trade panel */
  .trade{width:320px;background:var(--panel);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column}
  .tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  .tabs button{padding:12px 0;font-weight:500;color:var(--muted);position:relative;text-transform:capitalize}
  .tabs button.active{color:var(--brand)}
  .tabs button.active::after{content:"";position:absolute;left:16px;right:16px;bottom:0;height:2px;background:var(--brand);border-radius:2px 2px 0 0}
  .trade-body{padding:16px;display:flex;flex-direction:column;gap:16px}
  .label{font-size:12px;color:var(--muted)}
  .field{margin-top:6px;width:100%;height:40px;border-radius:8px;background:var(--panel-2);
    border:1px solid var(--border);padding:0 12px;outline:none}
  .row-2{display:flex;gap:8px;margin-top:6px}
  .row-2 .field{flex:1;margin-top:0}
  .row-2 select.field{width:82px;flex:0 0 auto;padding:0 8px}
  .quicks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
  .quicks button{height:32px;border-radius:8px;background:var(--panel-2);border:1px solid var(--border);font-size:12px}
  .quicks button:hover{border-color:var(--brand)}
  .toggle-row{display:flex;flex-direction:column;gap:8px}
  .toggle-head{display:flex;align-items:center;justify-content:space-between}
  .toggle{width:40px;height:24px;border-radius:999px;background:#3a3d4a;position:relative;transition:.15s}
  .toggle.on{background:var(--bull)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;height:20px;width:20px;background:#fff;border-radius:999px;transition:.15s}
  .toggle.on::after{left:18px}
  .kv{display:flex;justify-content:space-between;align-items:center;font-size:12px}
  .kv input{width:130px;height:32px;border-radius:8px;background:var(--panel-2);border:1px solid var(--border);
    padding:0 10px;text-align:right;font-size:12px}
  .kv input:disabled{opacity:.5}
  .summary{padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .buysell{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:8px}
  .buysell button{height:44px;border-radius:8px;font-weight:500;color:#fff}
  .sell{background:color-mix(in oklab,var(--bear) 90%,black)} .sell:hover{background:var(--bear)}
  .buy{background:color-mix(in oklab,var(--bull) 90%,black)} .buy:hover{background:var(--bull)}

  /* Footer trades */
  .trades{border-top:1px solid var(--border);background:color-mix(in oklab,var(--panel) 70%,transparent)}
  .trades-head{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border)}
  .trades-tabs{display:flex;gap:16px}
  .trades-tabs button{color:var(--muted);font-size:13px;padding:6px 0;position:relative}
  .trades-tabs button.active{color:var(--fg)}
  .trades-tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-11px;height:2px;background:var(--brand)}
  .badge{display:inline-block;margin-left:6px;font-size:11px;background:var(--panel-2);color:var(--muted);
    border:1px solid var(--border);border-radius:999px;padding:1px 8px}
  table.trades-table{width:100%;border-collapse:collapse;font-size:13px}
  .trades-table th{text-align:left;color:var(--muted);font-weight:500;font-size:12px;
    padding:10px 20px;border-bottom:1px solid var(--border);background:transparent}
  .trades-table td{padding:12px 20px;border-bottom:1px solid var(--border)}
  .trades-table tr:last-child td{border-bottom:0}
  .pill{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.02em}
  .pill.buy{background:color-mix(in oklab,var(--bull) 20%,transparent);color:var(--bull)}
  .pill.sell{background:color-mix(in oklab,var(--bear) 20%,transparent);color:var(--bear)}
  .pill.pending{background:color-mix(in oklab,#eab308 20%,transparent);color:#eab308}
  .close-btn{background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--muted)}
  .close-btn:hover{color:var(--fg);border-color:var(--bear)}
  .muted{color:var(--muted)}

  @media (max-width:1100px){
    .trade{width:280px}
    .symbols{flex-wrap:wrap}
  }
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Search here..." />
    </div>
    <div class="spacer"></div>
    <button class="btn-ghost">Watchlist</button>
    <button class="icon-btn"><span style="font-size:18px">🇺🇸</span></button>
    <button class="icon-btn" aria-label="Theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" aria-label="Alerts">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <div class="avatar"></div>
  </header>

  <!-- Symbols -->
  <div class="symbols" id="symbols"></div>

  <!-- Main -->
  <div class="main">
    <div class="tools" id="tools"></div>

    <div class="chart-panel">
      <div class="chart-head">
        <div class="chart-title" id="chartTitle">Gold Spot / U.S. Dollar · 1D · OANDA</div>
        <div class="intervals" id="intervals"></div>
        <button class="icon-btn" style="height:32px;width:32px" title="Candles">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v4M8 16v4M8 8h0v8h0z"/><path d="M16 2v6M16 14v8M16 8h0v6h0z"/></svg>
        </button>
        <button class="btn-ghost" style="height:32px;padding:0 12px;color:var(--muted);font-size:13px">Indicators</button>
      </div>
      <div class="chart-body" id="chart"></div>
    </div>

    <aside class="trade">
      <div class="tabs" id="tabs">
        <button data-tab="trade" class="active">Trade</button>
        <button data-tab="tools">Tools</button>
      </div>
      <div class="trade-body">
        <div>
          <div class="label">Order Type</div>
          <select class="field"><option>Market</option><option>Limit</option><option>Stop</option></select>
        </div>
        <div>
          <div class="label">Volume</div>
          <div class="row-2">
            <input class="field" value="1.00"/>
            <select class="field"><option>Lots</option><option>Units</option></select>
          </div>
          <div class="quicks">
            <button>0.01</button><button>0.1</button><button>1</button><button>10</button>
          </div>
        </div>
        <div>
          <div class="label">Leverage</div>
          <select class="field"><option>100x</option><option>50x</option><option>20x</option><option>10x</option></select>
        </div>

        <div class="toggle-row" id="tpRow">
          <div class="toggle-head"><span>TP</span><button class="toggle on" data-toggle="tp"></button></div>
          <div class="kv"><span class="muted">Price</span><input value="4,100.000"/></div>
          <div class="kv"><span class="muted">Pips</span><input value="+90.0"/></div>
        </div>
        <div class="toggle-row" id="slRow">
          <div class="toggle-head"><span>SL</span><button class="toggle on" data-toggle="sl"></button></div>
          <div class="kv"><span class="muted">Price</span><input value="3,950.000"/></div>
          <div class="kv"><span class="muted">Pips</span><input value="-60.0"/></div>
        </div>

        <div class="summary">
          <div class="kv"><span class="muted">Margin Required</span><span>100.00 USD</span></div>
          <div class="kv"><span class="muted">Est. Profit</span><span class="up">+90.00 USD</span></div>
        </div>
        <div class="buysell">
          <button class="sell">Sell</button>
          <button class="buy">Buy</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Footer: open / pending trades -->
  <section class="trades">
    <div class="trades-head">
      <div class="trades-tabs" id="tradeTabs">
        <button class="active" data-t="open">Open Positions<span class="badge" id="openCount">0</span></button>
        <button data-t="pending">Pending Orders<span class="badge" id="pendCount">0</span></button>
        <button data-t="history">History</button>
      </div>
      <div class="muted" style="font-size:12px">Auto-refresh · Live</div>
    </div>
    <div style="overflow-x:auto">
      <table class="trades-table" id="tradesTable">
        <thead>
          <tr>
            <th>Symbol</th><th>Side</th><th>Volume</th><th>Entry</th><th>Current</th>
            <th>SL</th><th>TP</th><th>Equity</th><th>P/L</th><th>Opened</th><th></th>
          </tr>
        </thead>
        <tbody id="tradesBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
// --- Data ---
const SYMBOLS = [
  {pair:"XAU/USD",price:"2,488.56",change:"-0.18%",up:false,tv:"OANDA:XAUUSD",title:"Gold Spot / U.S. Dollar"},
  {pair:"EUR/USD",price:"1.07520",change:"+0.21%",up:true,tv:"OANDA:EURUSD",title:"EUR/USD"},
  {pair:"AUD/USD",price:"0.66005",change:"+0.15%",up:true,tv:"OANDA:AUDUSD",title:"AUD/USD"},
  {pair:"GBP/USD",price:"1.27325",change:"-0.08%",up:false,tv:"OANDA:GBPUSD",title:"GBP/USD"},
  {pair:"USD/JPY",price:"199.84",change:"+0.12%",up:true,tv:"OANDA:USDJPY",title:"USD/JPY"},
  {pair:"USD/CHF",price:"0.5458",change:"-0.23%",up:false,tv:"OANDA:USDCHF",title:"USD/CHF"},
];
const INTERVALS = [["1m","1"],["5m","5"],["15m","15"],["1h","60"],["4h","240"],["1D","D"]];
const TOOL_ICONS = ["crosshair","minus","settings","trend","line","candle","type","zoom","ruler","magnet","trash"];
const svgFor = {
  crosshair:'<circle cx="12" cy="12" r="4"/><path d="M12 2v6M12 16v6M2 12h6M16 12h6"/>',
  minus:'<path d="M5 12h14"/>', settings:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3.9a7 7 0 0 0-1.7-1L14.5 3h-5l-.4 2a7 7 0 0 0-1.7 1l-2.3-.9-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 1.7 1l.4 2h5l.4-2a7 7 0 0 0 1.7-1l2.3.9 2-3.4-2-1.5c.1-.3.1-.7.1-1z"/>',
  trend:'<path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/>',
  line:'<path d="M3 12h4l3-8 4 16 3-8h4"/>',
  candle:'<path d="M8 3v4M8 17v4M8 7h0v10h0z M16 5v3M16 15v4M16 8h0v7h0z"/>',
  type:'<path d="M4 7V4h16v3M9 20h6M12 4v16"/>',
  zoom:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M8 11h6M11 8v6"/>',
  ruler:'<path d="M3 17l4-4 4 4 4-4 4 4 4-4-6-6L3 17z"/>',
  magnet:'<path d="M5 3h4v8a3 3 0 0 0 6 0V3h4v8a7 7 0 0 1-14 0V3zM5 15v3M19 15v3"/>',
  trash:'<path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>',
};

// --- Trades (open + pending) ---
const now = Date.now();
const TRADES = [
  {id:1,status:"open", symbol:"XAU/USD", side:"buy",  vol:0.50, entry:2478.10, current:2488.56, sl:2450.00, tp:2510.00, opened: now - 2*3600*1000},
  {id:2,status:"open", symbol:"EUR/USD", side:"sell", vol:1.00, entry:1.07840, current:1.07520, sl:1.08300, tp:1.06900, opened: now - 5*3600*1000},
  {id:3,status:"open", symbol:"USD/JPY", side:"buy",  vol:0.20, entry:199.10, current:199.84, sl:198.00, tp:201.20, opened: now - 30*60*1000},
  {id:4,status:"pending", symbol:"GBP/USD", side:"buy",  vol:0.30, entry:1.27000, current:1.27325, sl:1.26400, tp:1.28200, opened: now - 12*60*1000},
  {id:5,status:"pending", symbol:"AUD/USD", side:"sell", vol:0.40, entry:0.66500, current:0.66005, sl:0.66900, tp:0.65600, opened: now - 45*60*1000},
];
function pl(t){
  const dir = t.side==="buy" ? 1 : -1;
  const raw = (t.current - t.entry) * dir;
  // rough scale: FX ~ 10000, gold ~ 1
  const scale = t.symbol.startsWith("XAU") ? 100 : t.symbol.endsWith("JPY") ? 100 : 10000;
  return raw * scale * t.vol;
}
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleString(undefined,{month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function fmt(n,d=2){return Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d})}

// --- State ---
let activeIdx = 0;
let interval = "D";
let tradeTab = "open";

// --- Render helpers ---
const $ = (sel)=>document.querySelector(sel);

function renderSymbols(){
  const el = $("#symbols");
  el.innerHTML = SYMBOLS.map((s,i)=>`
    <button class="sym ${i===activeIdx?'active':''}" data-i="${i}">
      <div class="pair">${s.pair}</div>
      <div class="row">
        <span class="price">${s.price}</span>
        <span class="chg ${s.up?'up':'down'}">${s.change}</span>
      </div>
    </button>`).join("") +
    `<button class="sym-plus" aria-label="Add"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>`;
  el.querySelectorAll(".sym").forEach(b=>b.addEventListener("click",()=>{activeIdx=+b.dataset.i;renderAll();}));
}
function renderTools(){
  $("#tools").innerHTML = TOOL_ICONS.map(k=>`
    <button title="${k}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgFor[k]}</svg></button>
  `).join("");
}
function renderIntervals(){
  $("#intervals").innerHTML = INTERVALS.map(([l,v])=>`<button data-v="${v}" class="${interval===v?'active':''}">${l}</button>`).join("");
  $("#intervals").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{interval=b.dataset.v;renderChart();renderTitle();renderIntervals();}));
}
function renderTitle(){
  const s = SYMBOLS[activeIdx];
  const ivLabel = INTERVALS.find(x=>x[1]===interval)[0];
  $("#chartTitle").textContent = `${s.title} · ${ivLabel} · OANDA`;
}
function renderChart(){
  const s = SYMBOLS[activeIdx];
  const host = $("#chart");
  host.innerHTML = `<div class="tradingview-widget-container" style="height:100%;width:100%"></div>`;
  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
  script.async = true;
  script.type = "text/javascript";
  script.innerHTML = JSON.stringify({
    autosize:true, symbol:s.tv, interval, timezone:"Etc/UTC", theme:"dark", style:"1",
    locale:"en", toolbar_bg:"#0a0a0f", enable_publishing:false, hide_top_toolbar:false,
    hide_legend:false, withdateranges:false, allow_symbol_change:true, details:false,
    studies:["Volume@tv-basicstudies"],
    backgroundColor:"rgba(10,10,15,1)", gridColor:"rgba(255,255,255,0.04)",
    support_host:"https://www.tradingview.com"
  });
  host.firstElementChild.appendChild(script);
}
function renderTrades(){
  const rows = TRADES.filter(t=> tradeTab==="history" ? false : t.status===tradeTab);
  $("#openCount").textContent = TRADES.filter(t=>t.status==="open").length;
  $("#pendCount").textContent = TRADES.filter(t=>t.status==="pending").length;
  const body = $("#tradesBody");
  if(!rows.length){
    body.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:24px" class="muted">No ${tradeTab} trades</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(t=>{
    const p = pl(t);
    const priceDec = t.symbol.startsWith("XAU") ? 2 : t.symbol.endsWith("JPY") ? 2 : 5;
    const equity = 1000 + p; // placeholder per-trade equity
    const sideClass = t.status==="pending" ? "pending" : t.side;
    const sideLabel = t.status==="pending" ? "Pending · "+t.side.toUpperCase() : t.side.toUpperCase();
    return `<tr>
      <td>${t.symbol}</td>
      <td><span class="pill ${sideClass}">${sideLabel}</span></td>
      <td>${fmt(t.vol,2)}</td>
      <td>${fmt(t.entry,priceDec)}</td>
      <td>${fmt(t.current,priceDec)}</td>
      <td class="muted">${fmt(t.sl,priceDec)}</td>
      <td class="muted">${fmt(t.tp,priceDec)}</td>
      <td>${fmt(equity,2)} USD</td>
      <td class="${p>=0?'up':'down'}">${p>=0?'+':''}${fmt(p,2)} USD</td>
      <td class="muted">${fmtTime(t.opened)}</td>
      <td><button class="close-btn" data-close="${t.id}">${t.status==='pending'?'Cancel':'Close'}</button></td>
    </tr>`;
  }).join("");
  body.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>{
    const id = +b.dataset.close;
    const idx = TRADES.findIndex(x=>x.id===id);
    if(idx>-1){ TRADES.splice(idx,1); renderTrades(); }
  }));
}

// tabs & toggles
document.addEventListener("click",(e)=>{
  const tab = e.target.closest("#tabs button");
  if(tab){ document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b===tab)); }
  const tt = e.target.closest("#tradeTabs button");
  if(tt){
    document.querySelectorAll("#tradeTabs button").forEach(b=>b.classList.toggle("active",b===tt));
    tradeTab = tt.dataset.t; renderTrades();
  }
  const tg = e.target.closest(".toggle");
  if(tg){ tg.classList.toggle("on"); }
});

// live price jitter for realism
function tick(){
  TRADES.forEach(t=>{
    const step = (t.symbol.startsWith("XAU")?0.4: t.symbol.endsWith("JPY")?0.02:0.00015);
    t.current = +(t.current + (Math.random()-0.5)*step*2);
  });
  renderTrades();
}

function renderAll(){ renderSymbols(); renderTitle(); renderIntervals(); renderChart(); renderTrades(); }
renderTools(); renderAll();
setInterval(tick, 2500);
</script>
</body>
</html>
