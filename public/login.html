<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Growx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap\" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<canvas id="particles"></canvas>

<nav class="nav">
  <a href="home.html" class="nav-logo">
    <span class="nav-logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a0d00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
        <circle cx="12" cy="12" r="9"/><path d="M8 16L12 7l4 9"/><path d="M9.5 13h5"/>
      </svg>
    </span>
    <span>Funded<span class="text-grad-gold">NXT</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="accounts.html">Accounts</a></li>
    <li><a href="how-it-works.html">How It Works</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-cta">
    <a href="signup.html" class="btn btn-ghost btn-sm">Sign Up</a>
    <button class="nav-burger" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</nav>

<div class="login-wrap">
  <form id="login-form" class="login-box reveal" autocomplete="off">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--grad-purple);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow-purple);margin-bottom:14px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to access your dashboard & credentials.</p>
    </div>

    <div class="stack">
      <div class="field">
        <label for="li-email">Email address</label>
        <input id="li-email" class="input" type="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="li-pw">Password</label>
        <input id="li-pw" class="input" type="password" name="password" placeholder="Your password" minlength="6" required />
      </div>

      <div class="row" style="margin-top:2px;">
        <label for="li-remember" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;color:var(--text-secondary);">
          <input id="li-remember" type="checkbox" style="width:16px;height:16px;accent-color:#2563eb;" />
          Remember me
        </label>
        <a href="#" id="forgot-pw" style="color:var(--accent-gold);font-weight:600;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-gold btn-lg btn-block" style="margin-top:8px;">
        Sign In
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      </button>

      <div class="divider"><span>OR</span></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button type="button" class="btn btn-ghost btn-sm" disabled style="opacity:0.6;cursor:not-allowed;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v2.8h5.35c-.5 2.55-2.5 4.1-5.35 4.1-3.2 0-5.85-2.65-5.85-5.85S8.8 6.3 12 6.3c1.45 0 2.75.5 3.75 1.45l1.95-1.95C16.4 4.55 14.35 3.7 12 3.7 7.4 3.7 3.7 7.4 3.7 12s3.7 8.3 8.3 8.3c4.5 0 8-3.15 8-8.05 0-.55-.05-1.05-.15-1.55z"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-ghost btn-sm" disabled style="opacity:0.6;cursor:not-allowed;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <div style="text-align:center;margin-top:18px;font-size:0.92rem;color:var(--text-secondary);">
        New here?
        <a href="signup.html" style="color:var(--accent-gold);font-weight:700;margin-left:4px;">Create an account →</a>
      </div>
    </div>
  </form>
</div>

<script src="assets/js/reporter.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
