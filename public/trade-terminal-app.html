<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GrowX Trade Terminal</title>
<style>
  html,body{margin:0;height:100%;background:#05070d;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .spin{width:42px;height:42px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:s 0.8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .lbl{font-size:.85rem;color:#94a3b8;letter-spacing:.05em}
  iframe{border:0;width:100vw;height:100vh;display:block}
</style>
</head>
<body>
<div class="boot" id="boot">
  <div class="spin"></div>
  <div class="lbl">Loading trading terminal…</div>
</div>
<script>
(function(){
  // Auth gate (same as before)
  var session;
  try { session = JSON.parse(localStorage.getItem('stx_session') || 'null'); } catch(e){ session = null; }
  if (!session || !session.id) { location.replace('trade-terminal.html'); return; }

  // Viewport routing: mobile (< 900px) → tradepro; else desktop terminal.
  var isMobile = window.matchMedia('(max-width: 899px)').matches
              || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  var target = isMobile ? 'terminal-mobile.html' : 'terminal-desktop.html';

  // Pass account context via query so the terminal pages can read it if desired.
  var q = new URLSearchParams({
    id: session.id || '',
    plan: session.plan || '',
    balance: String(session.balance || ''),
    name: session.name || ''
  });
  var url = target + '#' + q.toString();

  // Mount as full-viewport iframe so users can return via nav without losing session state.
  var f = document.createElement('iframe');
  f.src = url;
  f.setAttribute('allow','fullscreen; clipboard-write');
  f.onload = function(){ var b = document.getElementById('boot'); if (b) b.remove(); };
  document.body.appendChild(f);

  // Re-route if the viewport class changes materially (e.g., rotating tablet).
  var lastMobile = isMobile;
  window.addEventListener('resize', function(){
    var m = window.matchMedia('(max-width: 899px)').matches;
    if (m !== lastMobile) { lastMobile = m; f.src = (m ? 'terminal-mobile.html' : 'terminal-desktop.html') + '#' + q.toString(); }
  });
})();
</script>
</body>
</html>
