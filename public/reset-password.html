<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password — Growx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<canvas id="particles"></canvas>

<nav class="nav">
  <a href="home.html" class="nav-logo">
    <span class="nav-logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a0d00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
        <circle cx="12" cy="12" r="9"/><path d="M8 16L12 7l4 9"/><path d="M9.5 13h5"/>
      </svg>
    </span>
    <span>Growx</span>
  </a>
  <div class="nav-cta">
    <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
  </div>
</nav>

<div class="login-wrap">
  <form id="reset-form" class="login-box reveal" autocomplete="off">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--grad-emerald, var(--grad-purple));display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow-purple);margin-bottom:14px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <h1>Choose a new password</h1>
      <p class="sub">Enter the 6-digit code we emailed to <strong id="rp-email">your email</strong> and pick a new password.</p>
    </div>

    <div class="stack">
      <div class="field">
        <label for="rp-code">6-digit code</label>
        <input id="rp-code" class="input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required style="font-family:'JetBrains Mono',monospace;letter-spacing:.25em;font-size:1.2rem;text-align:center;" autocomplete="one-time-code" />
        <div id="rp-validity" style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;text-align:center;letter-spacing:0.01em;">
          Valid for <strong style="color:var(--accent-gold);">15 minutes</strong> · if it expired, request a new one below.
        </div>
      </div>
      <div class="field">
        <label for="rp-pw">New password</label>
        <input id="rp-pw" class="input" type="password" minlength="8" placeholder="At least 8 characters" required />
      </div>
      <div class="field">
        <label for="rp-pw2">Confirm new password</label>
        <input id="rp-pw2" class="input" type="password" minlength="8" placeholder="Re-enter password" required />
      </div>

      <button id="rp-submit" type="submit" class="btn btn-gold btn-lg btn-block" style="margin-top:8px;">
        Update password
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>

      <div class="divider"><span>OR</span></div>

      <button id="rp-resend" type="button" class="btn btn-ghost btn-block">
        Resend code
      </button>

      <div style="text-align:center;margin-top:18px;font-size:0.92rem;color:var(--text-secondary);">
        Wrong email? <a href="forgot.html" style="color:var(--accent-gold);font-weight:700;margin-left:4px;">Start over</a>
      </div>
    </div>
  </form>
</div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const email = (params.get('email') || localStorage.getItem('growx_reset_email') || '').trim();
  const emailEl = document.getElementById('rp-email');
  if (emailEl) emailEl.textContent = email || 'your email';
  if (!email) { window.location.replace('forgot.html'); return; }

  const form = document.getElementById('reset-form');
  const codeInput = document.getElementById('rp-code');
  const pw1 = document.getElementById('rp-pw');
  const pw2 = document.getElementById('rp-pw2');
  const submit = document.getElementById('rp-submit');
  // Inline resend button (replaces the old "Send again" link that always
  // bounced through forgot.html). Calls /api/auth/forgot-password which
  // already rate-limits at 3 / 10 min and re-issues a reset code for any
  // verified email.
  const resendBtn = document.getElementById('rp-resend');

  function toast(msg, type = 'success') { window.fnxToast && window.fnxToast(msg, type); }

  if (resendBtn) {
    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          toast('Could not resend — try again later', 'error');
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend code';
          return;
        }
        // /api/auth/forgot-password deliberately returns ok for both verified
        // and unverified emails (anti-enumeration), so we mirror the same
        // generic copy used by forgot.html instead of claiming "A new code was sent".
        toast('If that email is registered, a new code is on its way');
        codeInput && (codeInput.value = '');
        codeInput && codeInput.focus();
        let cooldown = 10;
        resendBtn.textContent = 'Resend in ' + cooldown + 's';
        const tick = setInterval(() => {
          cooldown -= 1;
          if (cooldown <= 0) {
            clearInterval(tick);
            resendBtn.disabled = false;
            resendBtn.textContent = 'Resend code';
          } else {
            resendBtn.textContent = 'Resend in ' + cooldown + 's';
          }
        }, 1000);
      } catch (_) {
        toast('Network error', 'error');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      }
    });
  }
  codeInput && codeInput.focus();
  codeInput && codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 6);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = (codeInput.value || '').trim();
    const np = pw1.value || '';
    const npc = pw2.value || '';
    if (!/^\d{6}$/.test(code)) return toast('Enter the 6-digit code', 'error');
    if (np.length < 8)            return toast('Password must be at least 8 characters', 'error');
    if (np !== npc)               return toast('Passwords do not match', 'error');

    submit.disabled = true;
    submit.textContent = 'Updating…';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, code, new_password: np })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        const reason = (data && data.reason) || 'invalid';
        const msg = reason === 'expired' ? 'Code expired — request a new one'
                  : reason === 'too_many_attempts' ? 'Too many wrong tries'
                  : reason === 'bad_code' ? 'Code didn\'t match'
                  : 'Could not update password';
        toast(msg, 'error');
        submit.disabled = false;
        submit.innerHTML = 'Update password <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>';
        return;
      }
      // Draw checkmark + confetti, then close the page on redirect.
      // Tiny delay so the user perceives the submit-button checkmark before
      // the form is hidden and the success card takes over.
      const validity = document.getElementById('rp-validity');
      if (validity) validity.style.display = 'none';
      try { localStorage.removeItem('growx_reset_email'); } catch (_) {}
      setTimeout(function () {
        if (window.fnxShowSuccessCard) window.fnxShowSuccessCard({
          form: form,
          title: 'Password updated!',
          sub: 'Signing you in…',
          icon: 'check'
        });
        if (window.fnxConfetti) window.fnxConfetti({ count: 70, originX: 0.5 });
      }, 220);
      setTimeout(() => { window.location.href = 'login.html'; }, 1900);
    } catch (_) {
      toast('Network error — try again', 'error');
      submit.disabled = false;
      submit.innerHTML = 'Update password <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>';
    }
  });
})();
</script>
<script src="assets/js/reporter.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
