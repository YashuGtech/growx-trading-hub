<div class="login-wrap">
  <form id="signup-form" class="login-box reveal" autocomplete="off">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--grad-gold);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow-gold);margin-bottom:14px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1a0d00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <h1>Create your account</h1>
      <p class="sub" id="signup-sub">Tell us a few details so we can issue your credentials after payment.</p>
    </div>

    <div class="stack">
      <div class="field">
        <label for="su-name">Full name</label>
        <input id="su-name" class="input" type="text" name="name" placeholder="Jane Doe" required minlength="2" />
      </div>
      <div class="field">
        <label for="su-email">Email address</label>
        <input id="su-email" class="input" type="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="field" style="display:grid;grid-template-columns:120px 1fr;gap:10px;">
        <div>
          <label for="su-cc">Country code</label>
          <select id="su-cc" class="select" name="country_code">
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+91" selected>🇮🇳 +91</option>
            <option value="+971">🇦🇪 +971</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+49">🇩🇪 +49</option>
            <option value="+33">🇫🇷 +33</option>
            <option value="+81">🇯🇵 +81</option>
            <option value="+86">🇨🇳 +86</option>
            <option value="+55">🇧🇷 +55</option>
            <option value="+27">🇿🇦 +27</option>
            <option value="+34">🇪🇸 +34</option>
            <option value="+39">🇮🇹 +39</option>
            <option value="+62">🇮🇩 +62</option>
            <option value="+63">🇵🇭 +63</option>
            <option value="+64">🇳🇿 +64</option>
            <option value="+65">🇸🇬 +65</option>
            <option value="+82">🇰🇷 +82</option>
            <option value="+90">🇹🇷 +90</option>
            <option value="+92">🇵🇰 +92</option>
            <option value="+94">🇱🇰 +94</option>
            <option value="+966">🇸🇦 +966</option>
            <option value="+20">🇪🇬 +20</option>
            <option value="+234">🇳🇬 +234</option>
            <option value="+254">🇰🇪 +254</option>
            <option value="+380">🇺🇦 +380</option>
            <option value="+48">🇵🇱 +48</option>
            <option value="+31">🇳🇱 +31</option>
            <option value="+32">🇧🇪 +32</option>
            <option value="+46">🇸🇪 +46</option>
            <option value="+47">🇳🇴 +47</option>
            <option value="+351">🇵🇹 +351</option>
            <option value="+420">🇨🇿 +420</option>
            <option value="+43">🇦🇹 +43</option>
            <option value="+41">🇨🇭 +41</option>
            <option value="+7">🇷🇺 +7</option>
          </select>
        </div>
        <div>
          <label for="su-phone">Phone number</label>
          <input id="su-phone" class="input" type="tel" name="phone" placeholder="5551234567" required pattern="[0-9]{6,20}" inputmode="numeric" />
        </div>
      </div>

      <div class="field">
        <label for="su-country">Country of residence</label>
        <select id="su-country" class="select" name="country" required>
          <option value="">Select your country</option>
          <option>United States</option><option>United Kingdom</option><option>Canada</option>
          <option>India</option><option>United Arab Emirates</option><option>Saudi Arabia</option>
          <option>Australia</option><option>Germany</option><option>France</option>
          <option>Netherlands</option><option>Spain</option><option>Italy</option>
          <option>Singapore</option><option>South Africa</option><option>Brazil</option>
          <option>Mexico</option><option>Nigeria</option><option>Kenya</option>
          <option>Japan</option><option>South Korea</option><option>Philippines</option>
          <option>Indonesia</option><option>Pakistan</option><option>Bangladesh</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label for="su-pw">Password</label>
        <input id="su-pw" class="input" type="password" name="password" placeholder="Min 8 characters" minlength="8" required />
      </div>
      <div class="field">
        <label for="su-pw2">Confirm password</label>
        <input id="su-pw2" class="input" type="password" name="password_confirm" placeholder="Re-enter password" minlength="8" required />
      </div>

      <label for="su-terms" style="display:flex;align-items:flex-start;gap:10px;font-size:0.85rem;color:var(--text-secondary);margin-top:6px;line-height:1.5;cursor:pointer;">
        <input id="su-terms" type="checkbox" required style="width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:#2563eb;cursor:pointer;" />
        <span>I agree to the <a href="terms.html" style="color:var(--accent-gold);text-decoration:underline;font-weight:600;">Terms of Service</a>, <a href="terms.html#risk" style="color:var(--accent-gold);text-decoration:underline;font-weight:600;">Risk Disclosure</a>, and confirm I am 18+.</span>
      </label>

      <button type="submit" class="btn btn-gold btn-lg btn-block" style="margin-top:8px;">
        Create Account
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>

      <div class="divider"><span>OR</span></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button type="button" class="btn btn-ghost btn-sm" disabled style="opacity:0.6;cursor:not-allowed;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v2.8h5.35c-.5 2.55-2.5 4.1-5.35 4.1-3.2 0-5.85-2.65-5.85-5.85S8.8 6.3 12 6.3c1.45 0 2.75.5 3.75 1.45l1.95-1.95C16.4 4.55 14.35 3.7 12 3.7 7.4 3.7 3.7 7.4 3.7 12s3.7 8.3 8.3 8.3c4.5 0 8-3.15 8-8.05 0-.55-.05-1.05-.15-1.55z"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-ghost btn-sm" disabled style="opacity:0.6;cursor:not-allowed;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <div style="text-align:center;margin-top:18px;font-size:0.92rem;color:var(--text-secondary);">
        Already have an account?
        <a href="login.html" style="color:var(--accent-gold);font-weight:700;margin-left:4px;">Log In →</a>
      </div>
    </div>
  </form>
</div>

<script>
(function () {
  // Pre-fill any in-flight plan context, surface redirect target
  try {
    const plan = localStorage.getItem('fnx_plan');
    const params = new URLSearchParams(window.location.search);
    const target = params.get('redirect');
    if (target) localStorage.setItem('fnx_redirect', target);
    const subEl = document.getElementById('signup-sub');
    if (subEl && plan) {
      subEl.innerHTML = 'Tell us a few details so we can issue your credentials for the <strong style="color:var(--accent-gold);">' + plan + '</strong> account.';
    }
  } catch (e) {}
})();
</script>
<script src="assets/js/reporter.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
