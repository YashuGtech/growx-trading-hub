<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Growx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<canvas id="particles"></canvas>

<nav class="nav">
  <a href="home.html" class="nav-logo">
    <span class="nav-logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a0d00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto;">
        <circle cx="12" cy="12" r="9"/><path d="M8 16L12 7l4 9"/><path d="M9.5 13h5"/>
      </svg>
    </span>
    <span>Growx</span>
  </a>
  <div class="nav-cta">
    <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
  </div>
</nav>

<div class="login-wrap">
  <form id="forgot-form" class="login-box reveal" autocomplete="off">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--grad-purple);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow-purple);margin-bottom:14px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/>
        </svg>
      </div>
      <h1>Reset your password</h1>
      <p class="sub">Enter the email on your account. We'll send a 6-digit code to choose a new password.</p>
    </div>

    <div class="stack">
      <div class="field">
        <label for="fp-email">Email address</label>
        <input id="fp-email" class="input" type="email" name="email" placeholder="you@example.com" required />
      </div>

      <button id="fp-submit" type="submit" class="btn btn-gold btn-lg btn-block" style="margin-top:8px;">
        Send reset code
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>

      <div style="text-align:center;margin-top:18px;font-size:0.92rem;color:var(--text-secondary);">
        Remembered it? <a href="login.html" style="color:var(--accent-gold);font-weight:700;margin-left:4px;">Back to sign in</a>
      </div>
    </div>
  </form>
</div>

<script>
(function () {
  const form = document.getElementById('forgot-form');
  const submit = document.getElementById('fp-submit');
  function toast(msg, type = 'success') { window.fnxToast && window.fnxToast(msg, type); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('fp-email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email', 'error'); return; }
    submit.disabled = true;
    submit.textContent = 'Sending…';
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email })
      });
      const data = await res.json().catch(() => ({}));
      // Always show the same copy (no email enumeration).
      if (!res.ok) toast('Could not send code — try again later', 'error');
      else { toast('If that email is registered, a reset code is on its way'); }
      try { localStorage.setItem('growx_reset_email', email); } catch (_) {}
      setTimeout(() => { window.location.href = 'reset-password.html?email=' + encodeURIComponent(email); }, 1200);
    } catch (_) {
      toast('Network error — try again', 'error');
      submit.disabled = false;
      submit.innerHTML = 'Send reset code <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>';
    }
  });
})();
</script>
<script src="assets/js/reporter.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
