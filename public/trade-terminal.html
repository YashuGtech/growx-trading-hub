<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Stellar Trade Terminal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    :root {
      --st-bg: #070B18;
      --st-card: #101827;
      --st-border: #1F2B45;
      --st-blue: #3B82F6;
      --st-purple: #7C5CFF;
      --st-buy: #00E676;
      --st-sell: #FF4D57;
      --st-text: #FFFFFF;
      --st-muted: #A9B4C7;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--st-bg);
      color: var(--st-text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background */
    .st-bg {
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(circle at 20% 10%, rgba(59, 130, 246, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(124, 92, 255, 0.22) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.05) 0%, transparent 60%),
        #070B18;
    }
    .st-stars {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 25% 30%, rgba(255,255,255,0.6) 50%, transparent 100%),
        radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,0.4) 50%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.5) 50%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.3) 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 60%, rgba(59, 130, 246, 0.6) 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 15%, rgba(124, 92, 255, 0.5) 50%, transparent 100%);
      background-size: 400px 400px;
      animation: starDrift 60s linear infinite;
    }
    @keyframes starDrift { from { background-position: 0 0; } to { background-position: 400px 400px; } }

    .st-orbit {
      position: fixed;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      margin: -300px 0 0 -300px;
      border: 1px solid rgba(59, 130, 246, 0.08);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }
    .st-orbit::before {
      content: '';
      position: absolute;
      top: -5px; left: 50%;
      width: 10px; height: 10px;
      background: var(--st-blue);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--st-blue);
      animation: orbitSpin 30s linear infinite;
    }
    @keyframes orbitSpin { to { transform: rotate(360deg); } }

    /* Login Card */
    .st-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .st-card {
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      background: rgba(16, 24, 39, 0.7);
      border: 1px solid var(--st-border);
      border-radius: 24px;
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(59, 130, 246, 0.15);
      position: relative;
      overflow: hidden;
    }
    .st-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--st-blue), var(--st-purple), transparent);
    }
    .st-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .st-logo-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--st-blue), var(--st-purple));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }
    .st-logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }
    .st-logo-text span { color: var(--st-blue); }
    .st-tag {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--st-muted);
      text-transform: uppercase;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .st-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .st-sub {
      text-align: center;
      color: var(--st-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .st-field {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 16px;
    }
    .st-label {
      font-size: 0.78rem;
      color: var(--st-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .st-input-wrap {
      position: relative;
    }
    .st-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(7, 11, 24, 0.6);
      border: 1px solid var(--st-border);
      border-radius: 12px;
      color: var(--st-text);
      font-size: 0.95rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      outline: none;
      transition: all 0.2s;
    }
    .st-input:focus {
      border-color: var(--st-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: rgba(7, 11, 24, 0.9);
    }
    .st-input::placeholder { color: rgba(169, 180, 199, 0.5); }
    .st-input-icon {
      position: absolute;
      top: 50%; left: 14px;
      transform: translateY(-50%);
      color: var(--st-muted);
      pointer-events: none;
    }
    .st-toggle-pw {
      position: absolute;
      top: 50%; right: 14px;
      transform: translateY(-50%);
      color: var(--st-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .st-login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--st-blue), var(--st-purple));
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .st-login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(59, 130, 246, 0.55);
    }
    .st-login-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }

    .st-creds-hint {
      margin-top: 20px;
      padding: 14px 16px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 12px;
      font-size: 0.82rem;
      color: var(--st-muted);
      line-height: 1.5;
    }
    .st-creds-hint strong { color: var(--st-blue); }

    .st-back {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
    }
    .st-back a {
      color: var(--st-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .st-back a:hover { color: var(--st-text); }

    .st-error {
      background: rgba(255, 77, 87, 0.1);
      border: 1px solid rgba(255, 77, 87, 0.3);
      color: #ff8088;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .st-error.show { display: block; animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .st-features {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--st-border);
    }
    .st-feat {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      background: rgba(7, 11, 24, 0.4);
      border-radius: 10px;
      border: 1px solid var(--st-border);
    }
    .st-feat-icon { color: var(--st-blue); margin-bottom: 4px; }
    .st-feat-label { font-size: 0.68rem; color: var(--st-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

    .st-loading {
      position: fixed; inset: 0;
      background: var(--st-bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
    }
    .st-loading.hide { opacity: 0; pointer-events: none; }
    .st-spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--st-border);
      border-top-color: var(--st-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="st-bg"></div>
  <div class="st-stars"></div>
  <div class="st-orbit"></div>

  <div class="st-loading" id="loader">
    <div class="st-spinner"></div>
  </div>

  <div class="st-wrap">
    <div class="st-card">
      <div class="st-logo">
        <div class="st-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="M7 14l4-4 4 4 5-5"/>
          </svg>
        </div>
        <div class="st-logo-text">Stellar<span>Trade</span></div>
      </div>
      <div class="st-tag">Premium Trading Terminal</div>

      <div class="st-title">Welcome back, trader</div>
      <div class="st-sub">Sign in to access your funded account</div>

      <div class="st-error" id="err"></div>

      <form id="loginForm" autocomplete="off">
        <div class="st-field">
          <label class="st-label">Trading Account ID</label>
          <div class="st-input-wrap">
            <span class="st-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="loginId" class="st-input" placeholder="STX-XXXX-XXXX" required />
          </div>
        </div>

        <div class="st-field">
          <label class="st-label">Password</label>
          <div class="st-input-wrap">
            <span class="st-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="loginPw" class="st-input" placeholder="••••••••" required />
            <button type="button" class="st-toggle-pw" onclick="togglePw()">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="st-login-btn" id="loginBtn">
          <span>Launch Terminal</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="st-creds-hint" id="hint" style="display:none;">
        <strong>Your credentials are ready.</strong> We've auto-filled them from your funded account. Just click <em>Launch Terminal</em>.
      </div>

      <div class="st-features">
        <div class="st-feat">
          <div class="st-feat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </div>
          <div class="st-feat-label">100x Leverage</div>
        </div>
        <div class="st-feat">
          <div class="st-feat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
          </div>
          <div class="st-feat-label">Real-time Charts</div>
        </div>
        <div class="st-feat">
          <div class="st-feat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
          </div>
          <div class="st-feat-label">Virtual Trading</div>
        </div>
      </div>

      <div class="st-back">
        <a href="dashboard.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to dashboard
        </a>
      </div>
    </div>
  </div>

  <script>
    // Auto-fill credentials if they exist in localStorage
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hide');
      }, 400);

      const creds = JSON.parse(localStorage.getItem('stx_creds') || 'null');
      if (creds && creds.id) {
        document.getElementById('loginId').value = creds.id;
        document.getElementById('loginPw').value = creds.password;
        document.getElementById('hint').style.display = 'block';
      } else {
        // No creds yet — show error
        const err = document.getElementById('err');
        err.textContent = 'No trade terminal credentials found. Please complete payment first.';
        err.classList.add('show');
      }
    });

    function togglePw() {
      const inp = document.getElementById('loginPw');
      const isPw = inp.type === 'password';
      inp.type = isPw ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const err = document.getElementById('err');
      const btn = document.getElementById('loginBtn');

      err.classList.remove('show');

      const creds = JSON.parse(localStorage.getItem('stx_creds') || 'null');
      if (!creds) {
        err.textContent = 'No trade terminal credentials found. Please complete payment first.';
        err.classList.add('show');
        return;
      }
      if (id !== creds.id || pw !== creds.password) {
        err.textContent = 'Invalid credentials. Please check your trading account ID and password.';
        err.classList.add('show');
        return;
      }

      // Success — store session and go to app
      localStorage.setItem('stx_session', JSON.stringify({
        id: creds.id,
        loginAt: Date.now(),
        balance: parseFloat(localStorage.getItem('fnx_balance') || '10000'),
        plan: localStorage.getItem('fnx_plan') || 'Stellar 1',
        name: (JSON.parse(localStorage.getItem('fnx_user') || '{}').name) || 'Trader'
      }));

      btn.innerHTML = '<span>Launching...</span>';
      btn.disabled = true;

      setTimeout(() => {
        window.location.href = 'trade-terminal-app.html';
      }, 700);
    });
  </script>
</body>
</html>
